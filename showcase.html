<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YM Limo — Coming Soon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body {
  background: #0a0a0f;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}

#canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
  color: #fff;
  max-width: 800px;
  padding: 40px;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 4.5rem;
  font-weight: 700;
  letter-spacing: 6px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #c8a456, #e8d5a0, #c8a456);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.3); }
}

.tagline {
  font-size: 1rem;
  color: rgba(255,255,255,0.4);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 48px;
  font-weight: 300;
}

.tagline span { color: #c8a456; }

.car-container {
  position: relative;
  width: 700px;
  height: 240px;
  margin: 0 auto 40px;
  perspective: 1000px;
}

.car-track {
  position: absolute;
  bottom: 60px;
  left: -50px;
  right: -50px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(200,164,86,0.2) 20%, rgba(200,164,86,0.2) 80%, transparent);
}

.car-svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 40px rgba(200,164,86,0.15));
  animation: floatCar 4s ease-in-out infinite;
}

@keyframes floatCar {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-6px) rotate(0.3deg); }
}

.road-lines {
  position: absolute;
  bottom: 58px;
  left: 0;
  right: 0;
  height: 1px;
  background: repeating-linear-gradient(90deg, rgba(200,164,86,0.1) 0px, rgba(200,164,86,0.1) 30px, transparent 30px, transparent 50px);
  animation: roadMove 2s linear infinite;
}

@keyframes roadMove {
  from { transform: translateX(0); }
  to { transform: translateX(-50px); }
}

.stats {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-bottom: 40px;
}

.stat {
  text-align: center;
}

.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  color: #c8a456;
  display: block;
}

.stat-label {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 48px;
  border: 1px solid rgba(200,164,86,0.3);
  color: #c8a456;
  font-size: 0.75rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.4s;
  background: transparent;
  cursor: pointer;
}

.cta:hover {
  background: rgba(200,164,86,0.1);
  border-color: #c8a456;
  transform: translateY(-2px);
}

.glow-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #c8a456;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px rgba(200,164,86,0.5); }
  50% { opacity: 0.5; transform: scale(0.8); box-shadow: 0 0 20px rgba(200,164,86,0.2); }
}

.status-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
  margin-top: 32px;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="content">
  <div class="logo">YM LIMO</div>
  <div class="tagline">Premium <span>Chicago</span> Transportation</div>

  <div class="car-container">
    <div class="road-lines"></div>
    <div class="car-track"></div>
    <div class="car-svg">
      <svg viewBox="0 0 700 240" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Shadow glow -->
        <ellipse cx="350" cy="218" rx="260" ry="8" fill="rgba(200,164,86,0.06)"/>
        <!-- Body -->
        <path d="M90 170 L110 170 L130 155 L170 142 L530 142 L570 155 L590 170 L610 170 L610 190 L580 198 L520 200 L180 200 L120 198 L90 190 Z" fill="#1a1a2e" stroke="rgba(200,164,86,0.08)" stroke-width=".5"/>
        <path d="M110 160 L130 142 L155 130 L530 130 L555 142 L575 160 Z" fill="#1f1f35" stroke="rgba(200,164,86,0.08)" stroke-width=".5"/>
        <path d="M155 132 L170 118 L190 112 L500 112 L520 118 L535 132 Z" fill="#252540" stroke="rgba(200,164,86,0.06)" stroke-width=".5"/>
        <!-- Roof -->
        <path d="M190 115 L205 100 L220 94 L480 94 L495 100 L510 115 Z" fill="#2a2a48" stroke="rgba(200,164,86,0.06)" stroke-width=".5"/>
        <!-- Hood -->
        <path d="M530 135 L570 148 L590 160 L580 163 L550 148 L535 142 Z" fill="#22223a" stroke="rgba(200,164,86,0.05)" stroke-width=".5"/>
        <!-- Trunk -->
        <path d="M110 160 L100 170 L95 190 L105 192 L115 180 L125 167 Z" fill="#22223a" stroke="rgba(200,164,86,0.05)" stroke-width=".5"/>
        <!-- Windshield -->
        <path d="M528 138 L550 150 L565 165 L540 165 L520 152 Z" fill="rgba(200,164,86,0.05)" stroke="rgba(200,164,86,0.08)" stroke-width=".5"/>
        <!-- Rear window -->
        <path d="M125 145 L118 158 L112 170 L125 170 L135 158 L140 145 Z" fill="rgba(200,164,86,0.05)" stroke="rgba(200,164,86,0.08)" stroke-width=".5"/>
        <!-- Side windows -->
        <path d="M170 115 L182 102 L480 102 L492 115 L488 130 L175 130 Z" fill="rgba(200,164,86,0.03)" stroke="rgba(200,164,86,0.06)" stroke-width=".5"/>
        <!-- Window divider B-pillar -->
        <line x1="340" y1="102" x2="340" y2="130" stroke="rgba(200,164,86,0.06)" stroke-width=".5"/>
        <!-- Chrome trim -->
        <line x1="110" y1="160" x2="590" y2="160" stroke="rgba(200,164,86,0.1)" stroke-width="1"/>
        <line x1="105" y1="190" x2="595" y2="190" stroke="rgba(200,164,86,0.05)" stroke-width=".5"/>
        <!-- Headlight -->
        <path d="M598 165 L615 166 L615 182 L598 182 Z" fill="#c8a456" opacity="0.4"/>
        <path d="M608 169 L625 172 L625 178 L608 179 Z" fill="#c8a456" opacity="0.2" id="hglow"/>
        <!-- Taillight -->
        <path d="M88 168 L98 168 L98 182 L88 182 Z" fill="rgba(200,164,86,0.2)"/>
        <!-- Grille vertical bars -->
        <rect x="595" y="155" width="1.5" height="30" fill="rgba(200,164,86,0.06)" transform="rotate(-5 595 155)"/>
        <rect x="600" y="155" width="1.5" height="30" fill="rgba(200,164,86,0.06)" transform="rotate(-5 600 155)"/>
        <rect x="605" y="155" width="1.5" height="30" fill="rgba(200,164,86,0.06)" transform="rotate(-5 605 155)"/>
        <!-- Front wheel -->
        <g>
          <circle cx="500" cy="195" r="26" fill="#0d0d1a" stroke="rgba(200,164,86,0.12)" stroke-width="1.5"/>
          <circle cx="500" cy="195" r="18" fill="none" stroke="rgba(200,164,86,0.06)" stroke-width=".5"/>
          <circle cx="500" cy="195" r="6" fill="rgba(200,164,86,0.1)"/>
          <line x1="500" y1="171" x2="500" y2="219" stroke="rgba(200,164,86,0.04)" stroke-width=".5"/>
          <line x1="476" y1="195" x2="524" y2="195" stroke="rgba(200,164,86,0.04)" stroke-width=".5"/>
        </g>
        <!-- Rear wheel -->
        <g>
          <circle cx="200" cy="195" r="26" fill="#0d0d1a" stroke="rgba(200,164,86,0.12)" stroke-width="1.5"/>
          <circle cx="200" cy="195" r="18" fill="none" stroke="rgba(200,164,86,0.06)" stroke-width=".5"/>
          <circle cx="200" cy="195" r="6" fill="rgba(200,164,86,0.1)"/>
          <line x1="200" y1="171" x2="200" y2="219" stroke="rgba(200,164,86,0.04)" stroke-width=".5"/>
          <line x1="176" y1="195" x2="224" y2="195" stroke="rgba(200,164,86,0.04)" stroke-width=".5"/>
        </g>
        <!-- Underglow -->
        <line x1="150" y1="200" x2="550" y2="200" stroke="rgba(200,164,86,0.08)" stroke-width="3"/>
        <!-- Side mirror -->
        <path d="M585 142 L592 140 L594 148 L587 150 Z" fill="#252540" stroke="rgba(200,164,86,0.06)" stroke-width=".5"/>
        <!-- Door line -->
        <line x1="345" y1="135" x2="345" y2="192" stroke="rgba(200,164,86,0.05)" stroke-width=".3"/>
        <!-- Sunroof -->
        <rect x="280" y="98" width="120" height="6" rx="2" fill="rgba(200,164,86,0.04)" stroke="rgba(200,164,86,0.04)" stroke-width=".5"/>
      </svg>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><span class="stat-num">24/7</span><span class="stat-label">Service</span></div>
    <div class="stat"><span class="stat-num">50+</span><span class="stat-label">5-Star Reviews</span></div>
    <div class="stat"><span class="stat-num">100%</span><span class="stat-label">On-Time</span></div>
  </div>

  <button class="cta" onclick="window.location.reload()">
    <span class="glow-dot"></span>
    Experience YM Limousine
  </button>

  <div class="status-line">
    <span class="glow-dot"></span>
    S Y S T E M  ·  O N L I N E
  </div>
</div>

<script>
// Particle system
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouseX = 0, mouseY = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.hue = 40 + Math.random() * 15;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.reset();
    }
    const dx = mouseX - this.x;
    const dy = mouseY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120) {
      this.x -= dx * 0.008;
      this.y -= dy * 0.008;
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 164, 86, ${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw connecting lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(200, 164, 86, ${0.05 * (1 - dist / 100)})`;
        ctx.stroke();
      }
    }
  }
  
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
